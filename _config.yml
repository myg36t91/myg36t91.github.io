# Build Settings
remote_theme: minimal-mistakes-jekyll

title: YU-YI, XIAO
color_scheme: "dark"

callouts_level: quiet # or loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
  
plugins:
  - jekyll-seo-tag
